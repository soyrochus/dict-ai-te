<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Structured HTML Report</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @media print {
      body { background: white !important; }
      .no-print { display: none !important; }
      .print-break { page-break-before: always; }
      section, .report-card { break-inside: avoid; }
      a { color: inherit; text-decoration: none; }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <main id="report-root" data-report-schema="html-report-generator/v1" class="mx-auto max-w-7xl px-6 py-8">

    <!-- EDIT-REGION: cover:start -->
    <section id="section-cover" data-section="cover" data-title="Cover" class="mb-10">
      <header class="relative overflow-hidden rounded-3xl border border-slate-200 bg-white p-8 shadow-sm">
        <div class="absolute right-0 top-0 h-40 w-40 rounded-full bg-blue-100 blur-3xl"></div>
        <div class="relative flex flex-col gap-6 md:flex-row md:items-end md:justify-between">
          <div>
            <p class="text-sm font-semibold uppercase tracking-wide text-blue-700">Report</p>
            <h1 id="report-title" class="mt-3 text-4xl font-semibold tracking-tight text-slate-950">REPORT_TITLE</h1>
            <p id="report-subtitle" class="mt-4 max-w-3xl text-lg text-slate-600">REPORT_SUBTITLE</p>
          </div>
          <button onclick="window.print()" class="no-print rounded-xl bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700">Print / Save as PDF</button>
        </div>
      </header>
    </section>
    <!-- EDIT-REGION: cover:end -->

    <!-- EDIT-REGION: executive-summary:start -->
    <section id="section-executive-summary" data-section="executive-summary" data-title="Executive Summary" class="mt-10">
      <div class="mb-5">
        <p class="text-sm font-semibold uppercase tracking-wide text-blue-700">Executive Summary</p>
        <h2 class="mt-2 text-2xl font-semibold text-slate-950">Main conclusions</h2>
      </div>
      <div class="grid gap-4 md:grid-cols-3">
        <!-- COMPONENT: summary-card:example:start -->
        <article id="summary-card-example" data-component="summary-card" data-editable="true" class="report-card rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
          <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Finding</p>
          <h3 class="mt-2 text-lg font-semibold text-slate-950">SUMMARY_CARD_TITLE</h3>
          <p class="mt-3 text-sm leading-6 text-slate-600">SUMMARY_CARD_TEXT</p>
        </article>
        <!-- COMPONENT: summary-card:example:end -->
      </div>
    </section>
    <!-- EDIT-REGION: executive-summary:end -->

  </main>

  <script type="application/json" id="report-manifest">
  {
    "schema": "html-report-generator/v1",
    "title": "REPORT_TITLE",
    "version": "0.1",
    "language": "en",
    "designSystem": {
      "css": "tailwind-cdn",
      "dependencies": ["tailwind"],
      "optionalDependencies": []
    },
    "sections": [
      {
        "id": "section-cover",
        "key": "cover",
        "title": "Cover",
        "editable": true,
        "components": ["report-title", "report-subtitle"]
      },
      {
        "id": "section-executive-summary",
        "key": "executive-summary",
        "title": "Executive Summary",
        "editable": true,
        "components": ["summary-card-example"]
      }
    ],
    "components": [
      {
        "id": "summary-card-example",
        "type": "summary-card",
        "section": "section-executive-summary",
        "editable": true
      }
    ]
  }
  </script>
</body>
</html>
